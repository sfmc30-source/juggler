<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ジャグツール">
<title>ジャグラー設定推測ツール</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#e5e5ea;
  --bg-info:#e8f0fb;--bg-warn:#fff8e1;--bg-success:#e8f5e9;--bg-danger:#fdecea;
  --text:#1c1c1e;--text2:#6e6e73;--text3:#aeaeb2;
  --text-info:#1a56b0;--text-warn:#856404;--text-success:#2e7d32;--text-danger:#c62828;
  --border:#d1d1d6;--border2:#e5e5ea;--border-info:#b3caf5;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --bg-info:#1a2f5a;--bg-warn:#3a2e00;--bg-success:#1b3a1b;--bg-danger:#3a1a1a;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --text-info:#6ea8ff;--text-warn:#ffd54f;--text-success:#81c784;--text-danger:#ef9a9a;
  --border:#3a3a3c;--border2:#2c2c2e;--border-info:#2a4a8a;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:14px 16px;position:sticky;top:0;z-index:10;}
.hdr h1{font-size:17px;font-weight:700;}
.hdr p{font-size:11px;color:var(--text2);margin-top:2px;}
.tabs{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border2);position:sticky;top:57px;z-index:9;}
.tab{flex:1;padding:12px;font-size:14px;font-weight:500;background:transparent;border:none;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;}
.tab.on{color:var(--text-info);border-bottom-color:var(--text-info);}
.body{padding:14px 16px 80px;}
.sec{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin:16px 0 8px;}
.card{background:var(--bg);border:0.5px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.ctitle{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
select{width:100%;font-size:16px;padding:11px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);}
input[type=number]{font-size:16px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);width:100%;}
input[type=number]:focus{outline:none;border-color:var(--text-info);}
.note{font-size:12px;color:var(--text3);margin-top:6px;line-height:1.5;}
/* +/- カウンター行 */
.crow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border2);}
.crow:last-child{border-bottom:none;padding-bottom:0;}
.crow:first-child{padding-top:0;}
.clabel{font-size:14px;color:var(--text);flex:1;}
.counter{display:flex;align-items:center;gap:0;}
.cbtn{width:44px;height:44px;font-size:24px;font-weight:300;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;flex-shrink:0;}
.cnum{min-width:48px;text-align:center;font-size:20px;font-weight:700;color:var(--text);}
/* 大ボタン */
.bigbtn{width:100%;padding:16px;font-size:17px;font-weight:700;border-radius:14px;border:none;background:#1a56b0;color:#fff;margin:4px 0 16px;cursor:pointer;display:block;user-select:none;-webkit-user-select:none;}
.midbtn{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);margin-bottom:10px;cursor:pointer;display:block;user-select:none;-webkit-user-select:none;}
.savebtn{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:10px;border:1.5px solid var(--text-success);background:transparent;color:var(--text-success);margin-bottom:10px;cursor:pointer;display:block;user-select:none;-webkit-user-select:none;}
/* 結果 */
.div{border:none;border-top:0.5px solid var(--border2);margin:14px 0;}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.sc{background:var(--bg2);border-radius:10px;padding:10px 12px;text-align:center;}
.sv{font-size:17px;font-weight:700;}
.sl{font-size:11px;color:var(--text2);margin-top:3px;}
.brow{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg);margin-bottom:6px;}
.blbl{font-size:14px;font-weight:700;min-width:48px;}
.bwrap{flex:1;height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;}
.bfill{height:100%;border-radius:5px;}
.bpct{font-size:13px;font-weight:700;min-width:42px;text-align:right;}
.bdg{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--bg-info);color:var(--text-info);font-weight:700;white-space:nowrap;}
.rc{border-radius:14px;border:0.5px solid var(--border2);background:var(--bg2);padding:14px 16px;margin-bottom:12px;}
.rt{font-size:15px;font-weight:700;margin-bottom:6px;}
.rb{font-size:13px;color:var(--text2);line-height:1.8;}
.ok{color:var(--text-success);font-weight:700;}
.ng{color:var(--text-danger);font-weight:700;}
.warnbox{font-size:12px;padding:10px 14px;border-radius:10px;background:var(--bg-warn);color:var(--text-warn);margin-bottom:10px;}
.saveok{font-size:13px;color:var(--text-success);text-align:center;padding:8px;font-weight:600;}
/* 履歴 */
.hi{background:var(--bg);border:0.5px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.hitop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.himachine{font-size:15px;font-weight:700;}
.hidate{font-size:12px;color:var(--text2);margin-top:2px;}
.hidiff{font-size:20px;font-weight:800;}
.plus{color:var(--text-success);}
.minus{color:var(--text-danger);}
.zero{color:var(--text2);}
.hitags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.hitag{font-size:12px;padding:4px 10px;border-radius:10px;background:var(--bg2);color:var(--text2);}
.hiverdict{font-size:13px;padding:8px 12px;border-radius:8px;background:var(--bg2);color:var(--text2);}
.hiact{margin-top:10px;display:flex;gap:8px;}
.haibtn{font-size:13px;color:var(--text-info);background:none;border:1px solid var(--border-info);padding:7px 14px;border-radius:8px;font-weight:500;cursor:pointer;}
.hdelbtn{font-size:13px;color:var(--text-danger);background:none;border:1px solid var(--border2);padding:7px 14px;border-radius:8px;cursor:pointer;}
.haidetail{font-size:13px;color:var(--text2);margin-top:10px;padding:10px;background:var(--bg-info);border-radius:8px;line-height:1.7;display:none;white-space:pre-wrap;}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px;line-height:2;}
</style>
</head>

</div>

</div>
</div>

// カウンターボタンのセットアップ
function setupCounter(key,labelId){
  var mn=E(key+'-m'),pl=E(key+'-p'),nm=E(key+'-n');
  if(!mn||!pl||!nm)return;
  function upd(){nm.textContent=vals[key];}
  function dec(){vals[key]=Math.max(0,vals[key]-1);upd();}
  function inc(){vals[key]++;upd();}
  // タッチとクリック両対応
  function addTap(el,fn){
    var moved=false;
    el.addEventListener('touchstart',function(e){moved=false;},false);
    el.addEventListener('touchmove',function(e){moved=true;},false);
    el.addEventListener('touchend',function(e){if(!moved){e.preventDefault();fn();}},false);
    el.addEventListener('click',fn,false);
  }
  addTap(mn,dec);
  addTap(pl,inc);
}

// 計算
function lgamma(n){
  if(n<=1)return 0;var x=n,r=0;
  while(x<12){r-=Math.log(x);x++;}
  var inv=1/x;
  return r+(x-.5)*Math.log(x)-x+.5*Math.log(2*Math.PI)+inv*(1/12-inv*inv/360);
}
function lpois(k,lam){
  if(lam<=0||k<0)return -1e9;
  return k*Math.log(lam)-lam-lgamma(k+1);
}

  if(h56>.45)return{v:'高設定濃厚',c:'ok',b:'設定5・6合計 '+Math.round(h56*100)+'%。ボーナス後すぐに止めるのは惜しい状況です。次のボーナスまたは連チャン待ちで判断を。'};
  if(h456>.55)return{v:'中〜高設定の可能性',c:'',b:'設定4以上合計 '+Math.round(h456*100)+'%。RBの質を確認しながら継続を。RBが重くなったら撤退検討。'};
  if(l12>.55)return{v:'低設定の可能性大',c:'ng',b:'設定1・2合計 '+Math.round(l12*100)+'%。ボーナス後50G以内を目安に撤退を検討してください。'};
  return{v:'判断保留',c:'',b:'まだ収束不足。もう1000〜2000G打ってから再判断を。BB先行ならRB待ち、RB先行なら続行寄りで。'};
}

function doCalc(){
  var m=M[curKey];
  var games=Math.max(0,parseInt(E('games').value)||0);
  var sBB=m.d?vals.sBB:vals.sBB2;
  var cBB=m.d?vals.cBB:0;
  var sRB=m.d?vals.sRB:vals.sRB2;
  var cRB=m.d?vals.cRB:0;
  var grape=vals.grape;
  var bbt=sBB+cBB,rbt=sRB+cRB;
  if(games<1||(bbt+rbt<1&&grape<1)){
    alert('ゲーム数とBB/RBまたはぶどう回数を入力してください。');return;
  }
  var sc=[];
  for(var i=0;i<6;i++){
    var s=0;
    if(m.d){s+=lpois(sBB,games*m.sBB[i]);s+=lpois(cBB,games*m.cBB[i]);s+=lpois(sRB,games*m.sRB[i]);s+=lpois(cRB,games*m.cRB[i]);}
    else{s+=lpois(bbt,games*m.bb[i]);s+=lpois(rbt,games*m.rb[i]);}
    if(grape>0)s+=lpois(grape,games*m.g[i]);
    sc.push(s);
  }
  var mx=sc[0];for(var i=1;i<6;i++)if(sc[i]>mx)mx=sc[i];
  var ex=[],tot=0;
  for(var i=0;i<6;i++){ex.push(Math.exp(sc[i]-mx));tot+=ex[i];}
  var pr=[];for(var i=0;i<6;i++)pr.push(ex[i]/tot);
  lp=pr;lti=0;for(var i=1;i<6;i++)if(pr[i]>pr[lti])lti=i;

  var wb=E('warnbox');
  if(games<2000){wb.textContent='ゲーム数が少なく推測精度が低い場合があります（目安: 2000G以上）';wb.style.display='block';}
  else wb.style.display='none';

  var bbP=bbt>0?Math.round(games/bbt)+'':'—';
  var rbP=rbt>0?Math.round(games/rbt)+'':'—';
  var gpS=grape>0&&games>0?'1/'+(games/grape).toFixed(2):'—';
  var allP=bbt+rbt>0?Math.round(games/(bbt+rbt))+'':'—';
  E('sgrid').innerHTML=
    '<div class="sc"><div class="sv">1/'+bbP+'</div><div class="sl">BB確率</div></div>'+
    '<div class="sc"><div class="sv">1/'+rbP+'</div><div class="sl">RB確率</div></div>'+
    '<div class="sc"><div class="sv">'+gpS+'</div><div class="sl">ぶどう確率</div></div>'+
    '<div class="sc"><div class="sv">1/'+allP+'</div><div class="sl">合算確率</div></div>';

  var sorted=[];for(var i=0;i<6;i++)sorted.push({p:pr[i],i:i});
  sorted.sort(function(a,b){return b.p-a.p;});
  var bh='';
  for(var r=0;r<sorted.length;r++){
    var pp=sorted[r].p,ii=sorted[r].i,pct=Math.round(pp*100);
    bh+='<div class="brow">'+
      '<span class="blbl">'+SN[ii]+'</span>'+
      '<div class="bwrap"><div class="bfill" style="width:'+pct+'%;background:'+SC[ii]+';"></div></div>'+
      '<span class="bpct" style="color:'+SC[ii]+'">'+pct+'%</span>'+
      (r===0?'<span class="bdg">最有力</span>':'')+
      '</div>';
  }
  E('bars').innerHTML=bh;

  var si=stopInfo(pr);
  E('stopcard').innerHTML='<div class="rt"><span class="'+si.c+'">'+si.v+'</span></div><div class="rb">'+si.b+'</div>';
  var avg=0;for(var i=0;i<6;i++)avg+=pr[i]*m.r[i];
  E('evcard').innerHTML='<div class="rt">機械割・期待値ベース</div><div class="rb">'+
    '推定期待機械割: <strong>'+avg.toFixed(1)+'%</strong>（最有力 設定'+(lti+1)+': '+m.r[lti]+'%）<br>'+
    (avg>=100?'<span class="ok">期待値プラス圏内。継続有利。</span>':'<span class="ng">期待値マイナス圏内。撤退も選択肢。</span>')+
    (games<3000?'<br>目安3000Gまで残り <strong>'+(3000-games)+'G</strong>。':'')+
    '</div>';

  E('saveok').style.display='none';
  E('result').style.display='block';
  setTimeout(function(){E('result').scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function doAI(){
  if(!lp)return;
  var m=M[curKey];
  var games=Math.max(0,parseInt(E('games').value)||0);
  var sBB=m.d?vals.sBB:vals.sBB2;
  var cBB=m.d?vals.cBB:0;
  var sRB=m.d?vals.sRB:vals.sRB2;
  var cRB=m.d?vals.cRB:0;
  var grape=vals.grape;
  var diff=parseInt(E('diff').value);
  var bbt=sBB+cBB,rbt=sRB+cRB;
  var q='ジャグラーの設定推測と立ち回りの専門家として以下のデータを分析して日本語で具体的なアドバイスをください。\n\n'+
    '【機種】'+m.name+'\n【ゲーム数】'+games+'G\n'+
    '【BB確率】1/'+(bbt>0?Math.round(games/bbt):'未取得')+'（'+bbt+'回）\n'+
    '【RB確率】1/'+(rbt>0?Math.round(games/rbt):'未取得')+'（'+rbt+'回）\n'+
    (m.d?'【単独BB】'+sBB+'回 チェリー重複BB '+cBB+'回\n【単独RB】'+sRB+'回 チェリー重複RB '+cRB+'回\n':'')+
    '【ぶどう確率】'+(grape>0&&games>0?'1/'+(games/grape).toFixed(2):'未カウント')+'\n'+
    '【最有力設定】設定'+(lti+1)+'（'+Math.round(lp[lti]*100)+'%）\n'+
    '【設定5・6合計確率】'+Math.round((lp[4]+lp[5])*100)+'%\n'+
    (!isNaN(diff)?'【最終差枚】'+(diff>0?'+':'')+diff+'枚\n':'')+
    '\n400字以内で：1.設定の可能性 2.注目すべき判別ポイント 3.やめ時・続行の判断基準 4.立ち回りアドバイス';
  window.open('https://claude.ai/new?q='+encodeURIComponent(q),'_blank');
}

function doSave(){
  if(!lp)return;
  var m=M[curKey];
  var games=Math.max(0,parseInt(E('games').value)||0);
  var sBB=m.d?vals.sBB:vals.sBB2;
  var cBB=m.d?vals.cBB:0;
  var sRB=m.d?vals.sRB:vals.sRB2;
  var cRB=m.d?vals.cRB:0;
  var grape=vals.grape;
  var diff=parseInt(E('diff').value);
  var bbt=sBB+cBB,rbt=sRB+cRB;
  var si=stopInfo(lp);
  var now=new Date();
  var pad=function(n){return n<10?'0'+n:''+n;};
  var ds=now.getFullYear()+'/'+pad(now.getMonth()+1)+'/'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  hist.unshift({id:Date.now(),date:ds,machine:m.name,games:games,bbt:bbt,rbt:rbt,grape:grape,
    diff:isNaN(diff)?null:diff,ts:lti+1,tp:Math.round(lp[lti]*100),
    h56:Math.round((lp[4]+lp[5])*100),verdict:si.v});
  sh();
  E('saveok').style.display='block';
  setTimeout(function(){E('saveok').style.display='none';},2500);
}

addTap(E('btn-calc'),doCalc);
addTap(E('btn-ai'),doAI);
addTap(E('btn-save'),doSave);
addTap(E('btn-clear'),function(){
  if(!confirm('すべての履歴を削除しますか？'))return;
  hist=[];sh();renderHist();
});

function renderHist(){
  var c=E('hlist');
  if(!hist.length){c.innerHTML='<div class="empty">まだ履歴がありません。<br>判定後に「履歴に保存」を押してください。</div>';return;}
  var html='';
  for(var idx=0;idx<hist.length;idx++){
    var h=hist[idx];
    var ds=h.diff===null?'差枚: —':(h.diff>=0?'+':'')+h.diff+'枚';
    var dc=h.diff===null?'zero':h.diff>0?'plus':'minus';
    var tags=[h.games+'G'];
    if(h.bbt>0)tags.push('BB 1/'+Math.round(h.games/h.bbt));
    if(h.rbt>0)tags.push('RB 1/'+Math.round(h.games/h.rbt));
    if(h.grape>0)tags.push('ぶどう 1/'+(h.games/h.grape).toFixed(2));
    tags.push('高設定'+h.h56+'%');
    var th='';for(var t=0;t<tags.length;t++)th+='<span class="hitag">'+tags[t]+'</span>';
    html+='<div class="hi">'+
      '<div class="hitop">'+
        '<div><div class="himachine">'+h.machine+'</div><div class="hidate">'+h.date+'</div></div>'+
        '<div style="text-align:right"><div class="hidiff '+dc+'">'+ds+'</div><div style="font-size:12px;color:var(--text2);margin-top:3px;">設定'+h.ts+'最有力（'+h.tp+'%）</div></div>'+
      '</div>'+
      '<div class="hitags">'+th+'</div>'+
      '<div class="hiverdict">'+h.verdict+'</div>'+
      '<div class="hiact"><button class="hdelbtn" data-idx="'+idx+'">削除</button></div>'+
    '</div>';
  }
  c.innerHTML=html;
  var delbs=c.querySelectorAll('.hdelbtn');
  for(var i=0;i<delbs.length;i++){
    (function(btn){
      addTap(btn,function(){
        var idx=parseInt(btn.getAttribute('data-idx'));
        hist.splice(idx,1);sh();renderHist();
      });
    })(delbs[i]);
  }
}

})();
</script>
